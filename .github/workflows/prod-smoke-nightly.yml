name: Prod Smoke Nightly

# Distributed by tool-template. Do not edit in tool repos — edits will be
# overwritten by the next sync. Source:
#   tool-template/.github/workflows/templates/prod-smoke-nightly.yml.tmpl
#
# 本番 URL の夜間スモークチェック（P4-e:「ローカルで通ったのに本番でエラー」の機械検証）。
# vars.TOOL_URL 未設定のリポでは scripts/prod-smoke.mjs が SKIP (exit 0) し、何も実行しない。
# 設定済みのリポでは毎晩 本番 URL へ実 HTTP リクエストを送る（GET のみ・書込なし）。
# 検査ルートはリポ root の prod-smoke.config.json {"paths": ["/", "/dashboard"]} で opt-in 追加できる。
# 5xx / 接続不能を検出すると prod-smoke-fail ラベルで issue を自動起票する
# （既存 open issue があれば新規作成せずコメントで更新。ラベル未作成リポでは
#   事前に label create --force で作成し、それも失敗した場合はラベル無しで起票する）。

on:
  schedule:
    # 20:00 UTC = 05:00 JST。cache-purge (18:00 UTC) / pollution-zero (19:00 UTC) と
    # 被らない時刻帯。各ツールは run-time に最大 60s ジッターを足して同時着弾を分散させる。
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  prod-smoke:
    runs-on: ubuntu-latest
    env:
      TOOL_URL: ${{ vars.TOOL_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Jitter
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            sleep $((RANDOM % 60))
          fi

      - name: Run prod smoke
        id: smoke
        run: |
          node scripts/prod-smoke.mjs 2>&1 | tee smoke.log
          exit ${PIPESTATUS[0]}

      # 起票条件は「smoke step 自体の失敗」に限定する（20周目P3:
      # job 全体の failure() だけだと checkout / setup-node の失敗（GitHub 側障害等）
      # でも本番障害 issue が誤って立つ）。steps.smoke.outcome は continue-on-error
      # 適用前の実結果。
      - name: Ensure prod-smoke-fail label exists
        if: failure() && steps.smoke.outcome == 'failure' && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ラベル未作成リポで issue 起票が失敗しないよう事前に作成する（--force で既存でも成功）。
          # 作成に失敗しても || true で継続 — その場合 issue はラベル無しで起票される（下の fallback）。
          gh label create prod-smoke-fail --color D93F0B --description "本番smoke失敗" --force || true

      - name: Open or update issue on failure
        if: failure() && steps.smoke.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let log = '';
            try { log = fs.readFileSync('smoke.log', 'utf8'); } catch {}
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              `本番スモークチェック（nightly）が失敗しました (${today})。`,
              '',
              '## 検出結果',
              '```json',
              log.slice(0, 8000) || '(smoke.log empty)',
              '```',
              '',
              '## 想定される原因',
              '- 直近デプロイの失敗・ランタイムエラー（5xx）',
              '- ホスティング側の障害 / スリープ（接続不能）',
              '- vars.TOOL_URL の URL が古い・間違っている',
              '- prod-smoke.config.json の paths に廃止済みルートが残っている',
              '',
              '## 対応',
              '1. 上記 JSON の failed ルートをブラウザ / curl で再現確認',
              '2. デプロイログ・ランタイムログで根本原因を特定（症状の握り潰し禁止）',
              '3. 修正デプロイ後、workflow_dispatch で再実行して PASS を確認',
              '',
              `Run: ${runUrl}`,
            ].join('\n');
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'prod-smoke-fail', per_page: 1,
            });
            if (open.length > 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: open[0].number, body,
              });
            } else {
              const title = `prod-smoke-fail: 本番スモーク失敗 (${today})`;
              try {
                await github.rest.issues.create({
                  owner, repo, title, body,
                  labels: ['prod-smoke-fail'],
                });
              } catch (e) {
                // ラベル起因で失敗しても起票自体は諦めない（ラベル無しで再試行）
                core.warning(`ラベル付き issue 作成に失敗: ${e.message} — ラベル無しで再試行`);
                await github.rest.issues.create({ owner, repo, title, body });
              }
            }
